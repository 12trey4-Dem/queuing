<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBAHCBC Player Registration</title>
<style>
  :root {
    --bg:#0f172a; --panel:#111827; --line:#263244; --text:#f8fafc;
    --muted:#94a3b8; --accent:#22c55e; --danger:#ef4444; --focus:#38bdf8;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:grid; place-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b 55%,#111827);
    color:var(--text); font-family:Arial,Helvetica,sans-serif; padding:18px;
  }
  main {
    width:min(520px,100%); background:rgba(17,24,39,.96);
    border:1px solid var(--line); border-radius:8px; padding:22px;
    box-shadow:0 24px 70px rgba(0,0,0,.35);
  }
  h1 { margin:0 0 6px; font-size:1.55rem; }
  p { color:var(--muted); line-height:1.5; margin:0 0 18px; }
  label { display:block; margin:14px 0 6px; font-weight:700; font-size:.92rem; }
  input, select {
    width:100%; min-height:46px; border-radius:6px; border:1px solid var(--line);
    background:#0b1220; color:var(--text); padding:10px 12px; font-size:1rem;
  }
  input:focus, select:focus { outline:2px solid var(--focus); outline-offset:1px; }
  button {
    width:100%; margin-top:18px; min-height:48px; border:0; border-radius:6px;
    background:var(--accent); color:#052e16; font-size:1rem; font-weight:800;
    cursor:pointer;
  }
  button:disabled { opacity:.55; cursor:not-allowed; }
  .status {
    display:none; margin-top:14px; padding:12px; border-radius:6px;
    border:1px solid var(--line); background:#0b1220; color:var(--muted);
  }
  .status.ok { display:block; border-color:#166534; color:#bbf7d0; }
  .status.err { display:block; border-color:#7f1d1d; color:#fecaca; }
  .required { color:#fca5a5; }
</style>
</head>
<body>
<main>
  <h1>SBAHCBC Registration</h1>
  <p>Complete all required fields. Registration will not be submitted if any required information is missing.</p>

  <form id="registrationForm">
    <label for="fullName">Full name <span class="required">*</span></label>
    <input id="fullName" name="fullName" autocomplete="name" required minlength="2" placeholder="Enter full name">

    <label for="skill">Player category <span class="required">*</span></label>
    <select id="skill" name="skill" required>
      <option value="">Select category</option>
      <option value="Beginner">Beginner</option>
      <option value="LowerInt">Lower Intermediate</option>
      <option value="UpperInt">Upper Intermediate</option>
      <option value="Advanced">Advanced</option>
      <option value="Expert">Expert</option>
    </select>

    <label for="gender">Gender <span class="required">*</span></label>
    <select id="gender" name="gender" required>
      <option value="">Select gender</option>
      <option value="M">Male</option>
      <option value="F">Female</option>
    </select>

    <button id="submitBtn" type="submit">Submit Registration</button>
  </form>
  <div id="status" class="status"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const form = document.getElementById('registrationForm');
const statusBox = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');

function showStatus(message, type) {
  statusBox.textContent = message;
  statusBox.className = `status ${type}`;
}

function firebaseReady() {
  const cfg = window.SBAHCBC_FIREBASE_CONFIG || {};
  return cfg.apiKey && !cfg.apiKey.includes('PASTE_') && cfg.databaseURL && !cfg.databaseURL.includes('PASTE_');
}

if (!firebaseReady()) {
  submitBtn.disabled = true;
  showStatus('Online registration is not configured yet. Please add Firebase details in firebase-config.js.', 'err');
} else {
  firebase.initializeApp(window.SBAHCBC_FIREBASE_CONFIG);
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  if (!form.reportValidity()) return;

  const fullName = document.getElementById('fullName').value.trim().replace(/\s+/g, ' ');
  const skill = document.getElementById('skill').value;
  const gender = document.getElementById('gender').value;

  if (!fullName || !skill || !gender) {
    showStatus('Please complete all required fields.', 'err');
    return;
  }

  submitBtn.disabled = true;
  showStatus('Submitting registration...', 'ok');

  try {
    await firebase.database().ref('registrations').push({
      fullName,
      skill,
      gender,
      source: 'qr-registration',
      imported: false,
      createdAt: firebase.database.ServerValue.TIMESTAMP
    });
    form.reset();
    showStatus('Registration successful. Thank you.', 'ok');
  } catch (error) {
    showStatus(`Registration failed: ${error.message}`, 'err');
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
