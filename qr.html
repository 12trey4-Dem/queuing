<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBAHCBC Registration QR</title>
<style>
  body {
    margin:0; min-height:100vh; display:grid; place-items:center; padding:18px;
    background:#0f172a; color:#f8fafc; font-family:Arial,Helvetica,sans-serif;
  }
  main {
    width:min(560px,100%); background:#111827; border:1px solid #263244;
    border-radius:8px; padding:22px;
  }
  h1 { margin:0 0 8px; }
  p { color:#94a3b8; line-height:1.5; }
  input {
    width:100%; min-height:46px; border-radius:6px; border:1px solid #263244;
    background:#0b1220; color:#f8fafc; padding:10px 12px; font-size:1rem;
  }
  button {
    width:100%; min-height:46px; margin-top:10px; border:0; border-radius:6px;
    background:#22c55e; color:#052e16; font-weight:800; cursor:pointer;
  }
  .qr-wrap { display:grid; place-items:center; margin-top:18px; min-height:280px; background:#fff; border-radius:8px; padding:16px; }
  .qr-wrap img { width:260px; height:260px; image-rendering:pixelated; }
</style>
</head>
<body>
<main>
  <h1>Registration QR Code</h1>
  <p>After GitHub Pages is published, paste your public registration link here. It should end with <strong>/register.html</strong>.</p>
  <input id="urlInput" placeholder="https://yourname.github.io/repository/register.html">
  <button onclick="makeQr()">Generate QR Code</button>
  <div class="qr-wrap" id="qrWrap">
    <span style="color:#475569;">QR code will appear here</span>
  </div>
</main>
<script>
function makeQr(){
  const url=document.getElementById('urlInput').value.trim();
  const wrap=document.getElementById('qrWrap');
  if(!url){ wrap.innerHTML='<span style="color:#991b1b;">Enter the registration URL first.</span>'; return; }
  const src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data='+encodeURIComponent(url);
  wrap.innerHTML=`<img alt="Registration QR code" src="${src}">`;
}
</script>
</body>
</html>
